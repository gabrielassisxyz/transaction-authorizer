logging:
  # 12-factor: logs are an event stream to stdout as JSON, and the platform ships them.
  # Boot renders this natively, so it costs no extra dependency; MDC keys ride along as
  # top-level fields, which is what lets one grep follow a request or a message.
  structured:
    format:
      console: logstash

spring:
  application:
    name: transaction-authorizer
  # Reactive-level scaling while the code stays imperative; trade-offs in ADR-001.
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_authorizer}
    username: ${DB_USERNAME:authorizer}
    password: ${DB_PASSWORD:authorizer}
    hikari:
      # Under virtual threads the connection pool, not the thread pool, is the
      # concurrency limit, so it is sized explicitly instead of inherited.
      maximum-pool-size: ${DB_POOL_SIZE:20}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        # Only what is meant to be scraped or probed. Prometheus is the metrics scrape;
        # health carries the liveness/readiness groups. Nothing else is exposed by default.
        include: health,info,prometheus
  # Metric exporters are opt-in from Boot 4, so the Prometheus scrape registry and its
  # endpoint have to be turned on explicitly; without this the endpoint is absent.
  prometheus:
    metrics:
      export:
        enabled: true

sqs:
  region: ${AWS_REGION:sa-east-1}
  # Empty in a real deployment: the SDK then resolves the regional endpoint, and with no
  # endpoint override the credentials come from the default chain rather than from the
  # keys below, which exist only for the local emulator.
  endpoint: ${SQS_ENDPOINT:http://localhost:4566}
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  queue-name: ${SQS_QUEUE_NAME:conta-bancaria-criada}
  pollers: ${SQS_POLLERS:2}
