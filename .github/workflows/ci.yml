name: ci

on:
  push:
    branches: [main]
  # `edited` is here for the prose gate: a PR body is rewritten far more often than it
  # is pushed to, and without it the gate keeps reporting the text it saw at push time.
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  ci:
    # Editing a PR body cannot change the tree, so the build does not re-run for it.
    if: github.event_name != 'pull_request' || github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the gitleaks run inside bin/ci scans every commit.
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - run: bin/ci

  # Mutation testing on the domain, deliberately its own job and not part of bin/ci: it is
  # slow and advisory, so it informs test quality without gating merges. No mutation
  # threshold is set, so the job stays green while surfacing the score in its log.
  mutation:
    if: github.event_name != 'pull_request' || github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew pitest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report
          path: build/reports/pitest

  slop-guard-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PR text carries no prose tell
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: printf '%s\n%s\n' "$TITLE" "$BODY" | bin/slop-guard --stdin "PR text"
