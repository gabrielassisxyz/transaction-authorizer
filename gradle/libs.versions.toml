[versions]
kotlin = "2.3.21"
spring-boot = "4.1.0"
spring-dependency-management = "1.1.7"
ktlint-plugin = "13.1.0"
detekt = "1.23.8"
kover = "0.9.2"
# The stable line still calls reporting.baseDir, removed in Gradle 9; the 1.19 line is the
# first to run under this Gradle. Advisory, non-blocking job, so the release candidate is fine.
pitest-plugin = "1.19.0-rc.3"
pitest-junit5 = "1.2.1"
archunit = "1.4.1"
mockk = "1.14.2"
aws-sdk = "2.46.7"

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
kotlin-jpa = { id = "org.jetbrains.kotlin.plugin.jpa", version.ref = "kotlin" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint-plugin" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
pitest = { id = "info.solidsoft.pitest", version.ref = "pitest-plugin" }

[libraries]
pitest-junit5 = { module = "org.pitest:pitest-junit5-plugin", version.ref = "pitest-junit5" }
aws-bom = { module = "software.amazon.awssdk:bom", version.ref = "aws-sdk" }
aws-sqs = { module = "software.amazon.awssdk:sqs" }
archunit-junit5 = { module = "com.tngtech.archunit:archunit-junit5", version.ref = "archunit" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
