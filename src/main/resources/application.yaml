spring:
  application:
    name: transaction-authorizer
  # Reactive-level scaling while the code stays imperative; trade-offs in ADR-001.
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_authorizer}
    username: ${DB_USERNAME:authorizer}
    password: ${DB_PASSWORD:authorizer}
    hikari:
      # Under virtual threads the connection pool, not the thread pool, is the
      # concurrency limit, so it is sized explicitly instead of inherited.
      maximum-pool-size: ${DB_POOL_SIZE:20}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

sqs:
  region: ${AWS_REGION:sa-east-1}
  # Unset in a real deployment, where the SDK resolves the regional endpoint itself.
  endpoint: ${SQS_ENDPOINT:http://localhost:4566}
  # Blank keys fall back to the default credential chain (instance role, profile, env).
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  queue-name: ${SQS_QUEUE_NAME:conta-bancaria-criada}
  pollers: ${SQS_POLLERS:2}
